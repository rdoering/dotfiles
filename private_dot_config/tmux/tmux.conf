set-option -g history-limit 25000
set -g mouse on

# macOS: pipe copied selections to the system clipboard.
# Terminal.app does not support OSC 52, so without this a mouse selection
# only lands in the tmux buffer, never in the macOS clipboard.
set -s copy-command 'pbcopy'

# for neovim
set -sg escape-time 10
set-option -g focus-events on


# vi for copy mode
setw -g mode-keys vi

# status bar
set -g status-right "#(pomo)"
set -g status-style "fg=#665c54"
set -g status-left-style "fg=#928374"

# dim inactive window tabs, embolden the current one (attributes only,
# no absolute colors, to stay compatible with the terminal color scheme)
set -g window-status-style "dim"
set -g window-status-current-style "bold"

set -g status-bg default
set -g status-position top
set -g status-interval 1
set -g status-left ""
set -g status 2
set -g status-format[1] ""

# Window name shows exactly one thing, by priority:
#   1. AI/program title (pane_title, if the running program set one)
#   2. running command (pane_current_command, if not the shell)
#   3. current working directory
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{?#{!=:#{pane_title},#{host}},#{pane_title},#{pane_current_command}}}'

# Allow the AI agent/process to set the pane title (#T)
# Tab formatting: directory name + truncated pane title (max. 15 chars)
set -g allow-rename on

# AI agents (claude, opencode) encode their state in the pane title prefix
# (braille spinner = working, ✳ = waiting), which flows into window_name above.
set -g window-status-format '#I:#{=25:window_name}'
set -g window-status-current-format '#I:#{=25:window_name}*'

# Extended keys (Shift+Enter etc.): recognize CSI-u input from the terminal
# and forward it to all panes in CSI-u format.
# Note: kitty ignores tmux's modifyOtherKeys enable, so kitty.conf needs
# "map shift+enter send_text all \x1b[13;2u" for tmux to see the key at all.
set -g allow-passthrough on
set -s extended-keys on
set -s extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

# Window list (prefix+w) with the same single-value window names
bind-key w choose-tree -Zw -F '#{?pane_format,#{pane_current_command} "#{pane_title}",#{?window_format,#{=40:window_name},#{session_windows} windows}}'

# disable status
# set -g status off
# set -g status on

# count the panes from 1
set -g base-index 1
setw -g pane-base-index 1

# reload configuration
bind-key -r r source-file ~/.config/tmux/tmux.conf

# term colors, these are the correct ones according to neovim checkhealth
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ',xterm-256color:RGB'
